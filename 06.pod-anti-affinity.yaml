apiVersion: v1
kind: Pod
metadata:
 name: pod-1
 labels:
  tier: data1
spec:
 containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
 name: pod-2
 labels:
  tier: data2
spec:
 affinity:
   podAntiAffinity:
    #Hard rule must be satisfied then only it will schedule the pods
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
       matchExpressions:
        - key: tier
          operator: In
          values:
          - data1
      topologyKey: topology.kubernetes.io/zone   
 containers:
  - name: nginx
    image: nginx