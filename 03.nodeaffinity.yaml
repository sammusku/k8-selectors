apiVersion: v1
kind: Pod
metadata: 
 name: node-affinity
spec:
 affinity:
  nodeAffinity:
   #Hard rule
   requiredDuringSchedulingIgnoredDuringExecution:
    nodeSelectorTerms:
    - matchExpressions:
      - key: topology.kubernetes.io/zone
        operator: In
        values:
         - us-east-1c
 containers:
  - name: nginx
    image: nginx


   